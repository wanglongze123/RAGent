version: "3.9"

services:

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ragent
      MYSQL_USER: ragent
      MYSQL_PASSWORD: ragent123
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uragent", "-pragent123"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --save 3600 1

  qdrant:
    image: qdrant/qdrant:v1.12.4
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    environment:
      DB_TYPE: mysql
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ragent
      MYSQL_PASSWORD: ragent123
      MYSQL_DATABASE: ragent
      VECTOR_STORE: qdrant
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      CACHE_BACKEND: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATASET_DIR: /assets/ecommerce_agent_dataset
      RERANKER_MODEL_PATH: /assets/server/models/Xorbits/bge-reranker-base
    env_file:
      - server/.env
    volumes:
      - /root/_ragent_assets:/assets:ro

volumes:
  mysql_data:
  redis_data:
  qdrant_data:
